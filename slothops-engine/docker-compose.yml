services:
  postgres:
    image: postgres:16-alpine
    container_name: slothops_postgres
    environment:
      POSTGRES_DB: slothops
      POSTGRES_USER: slothops
      POSTGRES_PASSWORD: slothops_dev
    ports:
      - "5432:5432"
    volumes:
      - slothops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slothops -d slothops"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: slothops-engine:local
    container_name: slothops_engine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Container-internal URLs override .env so the engine talks to the
      # postgres service via its compose-network hostname.
      DATABASE_URL: postgresql+asyncpg://slothops:slothops_dev@postgres:5432/slothops
      DIRECT_DATABASE_URL: postgresql+psycopg://slothops:slothops_dev@postgres:5432/slothops
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: "8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  slothops_postgres_data:
    driver: local
