version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: slothops_postgres
    environment:
      POSTGRES_DB: slothops
      POSTGRES_USER: slothops
      POSTGRES_PASSWORD: slothops_dev
    ports:
      - "5432:5432"
    volumes:
      - slothops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slothops -d slothops"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  slothops_postgres_data:
    driver: local
